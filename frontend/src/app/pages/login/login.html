<div class="page">
  <div class="login-container animate-fade">
    <div class="card glass">
      <div class="login-header">
        <div class="logo-icon">
          <!-- SVG Icon for "Inclusive Access" -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10H12V2z" />
            <path d="M12 12L2.1 12.3" />
            <path d="M12 12l9.8 3.6" />
            <path d="M12 12l-5.2 8.5" />
            <path d="M12 12l7.4-6.8" />
            <path d="M12 12L7.6 3.6" />
            <path d="M12 12l-6.6 6.6" />
          </svg>
        </div>
        <h1 class="title">Bienvenido</h1>
        <p class="subtitle">Ingresa tus credenciales para acceder</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="form">
        <div class="form-group">
          <label class="label" for="email">Correo Electrónico</label>
          <input class="input" type="email" id="email" name="email" [(ngModel)]="email" required
            placeholder="ejemplo@correo.com" />
        </div>

        <div class="form-group">
          <label class="label" for="password">Contraseña</label>
          <input class="input" type="password" id="password" name="password" [(ngModel)]="password" required
            minlength="8" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 1rem;">
          Iniciar Sesión
        </button>

        @if (error) {
        <div class="error-text">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error }}
        </div>
        }
      </form>
    </div>

    <div class="login-footer">
      &copy; 2026 Plataforma Inclusiva Académica
    </div>
  </div>
</div>
