<div class="page-banner">
  <div class="banner-inner">
    <div>
      <h2 class="title">Catálogo de Productos</h2>
    </div>
    <div class="banner-right">
      <span class="banner-badge">{{ productos.length }} productos</span>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="productos-container">
  <p class="estado-msg" *ngIf="cargando">Cargando productos...</p>
  <p class="estado-msg error" *ngIf="error">{{ error }}</p>

  <div class="productos-grid" *ngIf="!cargando && !error">
    <div class="producto-card" *ngFor="let p of productos">
      <img
        [src]="p.urlImagen"
        [alt]="p.nombre"
        (error)="$any($event.target).src='https://placehold.co/400x200?text=Sin+imagen'"
      />
      <div class="card-body">
        <h3 class="producto-nombre">{{ p.nombre }}</h3>
        <p class="producto-descripcion">{{ p.descripcion }}</p>
        <span class="producto-precio">${{ p.precio }}</span>
      </div>
    </div>
  </div>
</div>
